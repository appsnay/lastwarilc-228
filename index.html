<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last War — Rekap Promote & Demote | ILC #228</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080a0f;
  --bg2:     #0e1118;
  --bg3:     #141921;
  --surface: #1a2030;
  --surface2:#202840;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --gold:    #f0a732;
  --gold2:   #ffd166;
  --golddim: rgba(240,167,50,0.18);
  --red:     #e84545;
  --red2:    #ff6b6b;
  --green:   #2ecc71;
  --green2:  #4fffab;
  --blue:    #3b82f6;
  --blue2:   #60a5fa;
  --muted:   rgba(255,255,255,0.38);
  --text:    rgba(255,255,255,0.90);
  --r2:      #94a3b8;
  --r3:      #f0a732;
  --font-h:  'Rajdhani', sans-serif;
  --font-b:  'Outfit', sans-serif;
}
/* ── LIGHT THEME ── */
[data-theme="light"] {
  --bg:      #f0f2f7;
  --bg2:     #ffffff;
  --bg3:     #f7f8fc;
  --surface: #eaecf4;
  --surface2:#dde1ef;
  --border:  rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);
  --gold:    #b86e00;
  --gold2:   #9a5a00;
  --golddim: rgba(184,110,0,0.10);
  --red:     #c0392b;
  --red2:    #c0392b;
  --green:   #27ae60;
  --green2:  #1a9652;
  --blue:    #1d4ed8;
  --blue2:   #1d4ed8;
  --muted:   rgba(0,0,0,0.42);
  --text:    rgba(0,0,0,0.86);
  --r2:      #475569;
  --r3:      #9a5a00;
}
[data-theme="light"] body::before{
  background-image:
    linear-gradient(rgba(184,110,0,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(184,110,0,0.04) 1px,transparent 1px);
}
[data-theme="light"] body::after{
  background:radial-gradient(ellipse,rgba(184,110,0,0.05) 0%,transparent 70%);
}
[data-theme="light"] .modal-ov{background:rgba(0,0,0,0.45)}
[data-theme="light"] .modal-box,[data-theme="light"] .login-box{box-shadow:0 20px 60px rgba(0,0,0,0.15)}
[data-theme="light"] #toast{background:#ffffff;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
[data-theme="light"] .btn-gold{color:#fff5e0}
/* ── THEME SWITCH ── */
.theme-switch{
  width:36px;height:36px;border-radius:8px;
  border:1px solid var(--border2);background:var(--surface);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:17px;transition:all .2s;flex-shrink:0;
}
.theme-switch:hover{background:var(--surface2);border-color:var(--gold)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-b);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── grid bg ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(240,167,50,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(240,167,50,0.025) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;z-index:0;
}

/* glow orb top */
body::after{
  content:'';
  position:fixed;
  top:-160px;left:50%;transform:translateX(-50%);
  width:700px;height:320px;
  background:radial-gradient(ellipse,rgba(240,167,50,0.07) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:0 16px 60px}

/* ══════════ HEADER ══════════ */
.header{
  padding:30px 0 22px;
  border-bottom:1px solid var(--border);
  margin-bottom:26px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  flex-wrap:wrap;
}
.hbrand{display:flex;align-items:center;gap:14px}
.hicon{
  width:48px;height:48px;
  background:linear-gradient(135deg,#f0a732,#c45f00);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
  box-shadow:0 4px 20px rgba(240,167,50,0.3);
}
.htitle{
  font-family:var(--font-h);
  font-size:24px;font-weight:700;
  letter-spacing:1px;color:var(--gold2);line-height:1.1;
}
.hsub{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.4px}
.hright{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.week-pill{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:8px;padding:7px 14px;
  font-family:var(--font-h);font-size:13px;font-weight:600;
  color:var(--gold);letter-spacing:.5px;
}
.admin-pill{
  display:flex;align-items:center;gap:7px;
  background:rgba(240,167,50,0.1);
  border:1px solid rgba(240,167,50,0.3);
  border-radius:8px;padding:6px 12px;
  font-size:12px;font-weight:600;color:var(--gold2);cursor:pointer;
  transition:all .2s;
}
.admin-pill:hover{background:rgba(240,167,50,0.18)}
.admin-dot{width:7px;height:7px;border-radius:50%;background:var(--green2);box-shadow:0 0 6px var(--green2)}
.admin-dot.off{background:var(--muted);box-shadow:none}

/* ══════════ NAV ══════════ */
.nav{
  display:flex;gap:4px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:4px;margin-bottom:24px;
}
.nav-btn{
  flex:1;padding:10px 6px;
  background:transparent;border:none;border-radius:8px;
  color:var(--muted);font-family:var(--font-b);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.nav-btn:hover{color:var(--text);background:var(--surface)}
.nav-btn.active{background:var(--surface2);color:var(--gold2);border:1px solid rgba(240,167,50,0.28)}
.nbadge{
  background:rgba(240,167,50,0.18);color:var(--gold);
  font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:20px;text-align:center;
}
/* lock icon on admin-only tabs */
.tab-lock{font-size:11px;opacity:.5}

/* ══════════ CARD ══════════ */
.card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:20px;margin-bottom:16px;
}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{
  font-family:var(--font-h);font-size:16px;font-weight:700;
  letter-spacing:.5px;color:var(--gold2);
  display:flex;align-items:center;gap:8px;
}

/* ══════════ BUTTONS ══════════ */
.btn{
  padding:8px 18px;border-radius:8px;border:none;
  font-family:var(--font-b);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-gold{background:linear-gradient(135deg,#f0a732,#d4860e);color:#180e00}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-red{background:rgba(232,69,69,0.14);color:var(--red2);border:1px solid rgba(232,69,69,0.28)}
.btn-red:hover{background:rgba(232,69,69,0.24)}
.btn-blue{background:rgba(59,130,246,0.12);color:var(--blue2);border:1px solid rgba(59,130,246,0.28)}
.btn-blue:hover{background:rgba(59,130,246,0.22)}
.btn-ghost{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;filter:none!important}

/* ══════════ FORM ══════════ */
.field{margin-bottom:14px}
.flabel{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block}
.finput{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;
  color:var(--text);font-family:var(--font-b);font-size:14px;
  outline:none;transition:border-color .2s;
}
.finput:focus{border-color:rgba(240,167,50,.5)}
.finput::placeholder{color:var(--muted)}

/* ══════════ MEMBER ROW ══════════ */
.mlist{display:flex;flex-direction:column;gap:8px}
.mrow{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:11px 14px;
  display:flex;align-items:center;gap:10px;transition:border-color .2s;
}
.mrow:hover{border-color:var(--border2)}
.mnum{font-size:11px;color:var(--muted);width:24px;text-align:right;flex-shrink:0}
.mname{flex:1;font-size:14px;font-weight:500}
.rbadge{
  font-family:var(--font-h);font-size:12px;font-weight:700;
  padding:3px 10px;border-radius:6px;letter-spacing:.5px;
}
.r-r2{background:rgba(148,163,184,.14);color:var(--r2);border:1px solid rgba(148,163,184,.28)}
.r-r3{background:rgba(240,167,50,.14);color:var(--r3);border:1px solid rgba(240,167,50,.28)}

/* ══════════ FAIL TAGS ══════════ */
.ftags{display:flex;flex-wrap:wrap;gap:8px;min-height:40px}
.ftag{
  background:rgba(232,69,69,.12);border:1px solid rgba(232,69,69,.3);
  color:var(--red2);border-radius:8px;padding:5px 10px 5px 12px;
  font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:6px;
  animation:tagIn .2s ease;
}
@keyframes tagIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.ftag button{background:none;border:none;color:rgba(255,107,107,.5);cursor:pointer;font-size:14px;padding:0;line-height:1;display:flex;align-items:center}
.ftag button:hover{color:var(--red2)}

/* ══════════ AUTOCOMPLETE ══════════ */
.acwrap{position:relative}
.aclist{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:8px;z-index:100;max-height:200px;overflow-y:auto;display:none;
}
.aclist.open{display:block}
.acitem{
  padding:9px 14px;font-size:14px;cursor:pointer;
  display:flex;align-items:center;gap:10px;transition:background .15s;
}
.acitem:hover,.acitem.sel{background:var(--surface2)}

/* ══════════ SUMMARY ══════════ */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:500px){.sgrid{grid-template-columns:1fr}}
.scard{border-radius:12px;padding:16px;border:1px solid}
.scard.dem{background:rgba(232,69,69,.07);border-color:rgba(232,69,69,.25)}
.scard.pro{background:rgba(46,204,113,.07);border-color:rgba(46,204,113,.25)}
.scard-hd{font-family:var(--font-h);font-size:15px;font-weight:700;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.scard.dem .scard-hd{color:var(--red2)}
.scard.pro .scard-hd{color:var(--green2)}
.smrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.smrow:last-child{border-bottom:none;padding-bottom:0}

/* ══════════ STATS ══════════ */
.stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.sbox{
  flex:1;min-width:90px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;text-align:center;
}
.snum{font-family:var(--font-h);font-size:28px;font-weight:700;line-height:1}
.slbl{font-size:11px;color:var(--muted);margin-top:4px}
.c-gold{color:var(--gold2)}.c-red{color:var(--red2)}.c-green{color:var(--green2)}.c-blue{color:var(--blue2)}

/* ══════════ HISTORY ══════════ */
.hwrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:10px}
.hhd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.htitle-w{font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px}
.hbody{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.hbody.open{display:block}
.fpill{display:inline-block;background:rgba(232,69,69,.12);border:1px solid rgba(232,69,69,.25);color:var(--red2);font-size:12px;padding:3px 10px;border-radius:20px;margin:3px}
.chev{transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(180deg)}

/* ══════════ ALERTS ══════════ */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.alert-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--blue2)}
.alert-warn{background:rgba(240,167,50,.1);border:1px solid rgba(240,167,50,.3);color:var(--gold2)}
.alert-red{background:rgba(232,69,69,.1);border:1px solid rgba(232,69,69,.3);color:var(--red2)}

/* ══════════ SEARCH ══════════ */
.sbar{position:relative;margin-bottom:16px}
.sbar input{padding-left:36px}
.sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}

/* ══════════ EMPTY ══════════ */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-ico{font-size:36px;margin-bottom:12px}
.empty-txt{font-size:14px}

/* ══════════ LOADING ══════════ */
.spinner{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .7s linear infinite;margin:40px auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{text-align:center;padding:30px 0;color:var(--muted);font-size:13px}

/* ══════════ MODAL ══════════ */
.modal-ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.78);z-index:400;
  align-items:center;justify-content:center;
  backdrop-filter:blur(5px);
}
.modal-ov.open{display:flex;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:18px;padding:30px 26px 24px;
  width:90%;max-width:420px;
  box-shadow:0 30px 80px rgba(0,0,0,.65);
  animation:slideUp .2s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-family:var(--font-h);font-size:20px;font-weight:700;color:var(--gold2);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.modal-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block}
.modal-inp{
  width:100%;background:var(--surface);
  border:1px solid rgba(240,167,50,.35);
  border-radius:8px;padding:11px 14px;
  color:var(--text);font-family:var(--font-b);font-size:15px;
  outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:16px;
}
.modal-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,167,50,.15)}
.modal-inp::placeholder{color:var(--muted)}
.modal-acts{display:flex;gap:8px;justify-content:flex-end}
.modal-err{color:var(--red2);font-size:12px;margin-bottom:10px;display:none}
.modal-err.show{display:block}

/* ══════════ LOGIN PAGE ══════════ */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;padding:20px;
}
.login-box{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:20px;padding:36px 30px;width:100%;max-width:380px;
  box-shadow:0 40px 100px rgba(0,0,0,.5);
  animation:slideUp .3s ease;
}
.login-ico{font-size:40px;text-align:center;margin-bottom:6px}
.login-title{font-family:var(--font-h);font-size:28px;font-weight:700;color:var(--gold2);text-align:center;letter-spacing:1px}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}

/* ══════════ TOAST ══════════ */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;padding:10px 20px;font-size:13px;font-weight:500;
  z-index:999;transition:transform .3s ease,opacity .3s ease;opacity:0;white-space:nowrap;
  pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.success{border-color:rgba(79,255,171,.4);color:var(--green2)}
#toast.error{border-color:rgba(255,107,107,.4);color:var(--red2)}
#toast.info{border-color:rgba(240,167,50,.4);color:var(--gold2)}

/* ══════════ PUBLIC BANNER ══════════ */
.pub-banner{
  background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);
  border-radius:10px;padding:10px 16px;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;font-size:13px;color:var(--blue2);
}

/* ══════════ FIREBASE STATUS ══════════ */
.fb-status{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;color:var(--muted);padding:4px 10px;
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
}
.fb-dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.fb-dot.ok{background:var(--green2);box-shadow:0 0 5px var(--green2)}
.fb-dot.err{background:var(--red2)}

/* ══════════ STATUS BADGE ══════════ */
.sbadge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.s-join{background:rgba(46,204,113,.14);color:var(--green2)}
.s-out {background:rgba(255,107,107,.12);color:var(--red2)}
.shist{font-size:11px;border-top:1px solid var(--border);padding:8px 8px 8px 32px;
  color:var(--muted);line-height:1.7;display:none}
.shist.open{display:block}

@media(max-width:600px){
  .header{flex-direction:column;align-items:flex-start}
  .nav-btn .tab-txt{display:none}
  .htitle{font-size:19px}
}
</style>
</head>
<body>
<script>
  // Terapkan tema SECEPATNYA sebelum render untuk hindari flicker
  (function(){
    var t=localStorage.getItem('ilc-theme')||'dark';
    document.documentElement.setAttribute('data-theme',t);
  })();
</script>

<!-- TOAST -->
<div id="toast"></div>

<!-- ══════ LOGIN MODAL ══════ -->
<div class="modal-ov" id="login-modal">
  <div class="modal-box">
    <div class="login-ico">🔐</div>
    <div class="login-title">ADMIN LOGIN</div>
    <div class="login-sub" data-t="login_sub" style="margin-bottom:20px">Masuk sebagai admin untuk mengelola data aliansi</div>
    <label class="modal-label" data-t="login_email">Email</label>
    <input class="modal-inp" id="li-email" type="email" placeholder="admin@email.com" onkeydown="if(event.key==='Enter')document.getElementById('li-pass').focus()">
    <label class="modal-label" data-t="login_pass">Password</label>
    <input class="modal-inp" id="li-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="modal-err" id="li-err"></div>
    <div class="modal-acts">
      <button class="btn btn-ghost" data-t="login_cancel" onclick="closeLoginModal()">Batal</button>
      <button class="btn btn-gold" id="li-btn" data-t="login_btn" onclick="doLogin()">🔑 Masuk</button>
    </div>
  </div>
</div>

<!-- ══════ EDIT NAME MODAL ══════ -->
<div class="modal-ov" id="edit-modal">
  <div class="modal-box">
    <div class="modal-title" data-t="edit_title">✏️ Edit Nama Member</div>
    <div class="modal-sub" id="edit-sub" data-t="edit_sub">Nama baru akan otomatis terupdate di semua rekap & histori.</div>
    <label class="modal-label" data-t="edit_label">Nama Baru</label>
    <input class="modal-inp" id="edit-inp" data-t-ph="edit_placeholder" placeholder="Masukkan nama baru..." onkeydown="if(event.key==='Enter')saveEdit();if(event.key==='Escape')closeEdit()">

// ════════════════════════════════════════
//  WEEK UTILS
// ════════════════════════════════════════
function getWeekKey(date) {
  const d = date || new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}
function getWeekLabel(key) {
  const [yr, w] = key.split('-W');
  const jan1 = new Date(parseInt(yr), 0, 1);
  const off = (parseInt(w) - 1) * 7 - jan1.getDay() + 1;
  const mon = new Date(jan1.getTime() + off * 86400000);
  const fri = new Date(mon.getTime() + 4 * 86400000);
  const fmt = d => `${d.getDate()} ${['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][d.getMonth()]}`;
  return `${key} (${fmt(mon)} – ${fmt(fri)})`;
}
window.getWeekLabel = getWeekLabel;

let unsubMembers, unsubWeeks;

function startListeners() {
  unsubMembers = onSnapshot(MEMBERS_DOC, snap => {
    S.members = snap.exists() ? (snap.data().list || []) : [];
    if (S.loaded) rerender();
    setFbStatus(true);
  }, err => { setFbStatus(false); console.error(err); });

  unsubWeeks = onSnapshot(WEEKS_DOC, snap => {
    S.weeks = snap.exists() ? (snap.data().data || {}) : {};
    if (S.loaded) rerender();
    S.loaded = true;
    document.getElementById('app').style.display = 'block';
    updateUI();
  }, err => { setFbStatus(false); console.error(err); });
}

async function saveMembers() {
  await setDoc(MEMBERS_DOC, { list: S.members });
}
async function saveWeeks() {
  await setDoc(WEEKS_DOC, { data: S.weeks });
}

function setFbStatus(ok) {
  document.getElementById('fb-dot').className = 'fb-dot ' + (ok ? 'ok' : 'err');
  document.getElementById('fb-lbl').textContent = ok ? t('fb_connected') : t('fb_offline');
}

onAuthStateChanged(auth, user => {
  S.user    = user;
  S.isAdmin = !!user;
  updateUI();
  if (!S.loaded) startListeners();
});

window.doLogin = async function() {
  const email = document.getElementById('li-email').value.trim();
  const pass  = document.getElementById('li-pass').value;
  const btn   = document.getElementById('li-btn');
  const err   = document.getElementById('li-err');
  err.classList.remove('show');
  if (!email || !pass) { showErr('li-err', t('login_empty')); return; }
  btn.disabled = true; btn.textContent = t('login_processing');
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    closeLoginModal();
    toast(t('login_success'),'success');
  } catch(e) {
    let msg = t('login_fail');
    if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = t('login_wrong_cred');
    if (e.code === 'auth/too-many-requests') msg = t('login_too_many');
    showErr('li-err', msg);
  }
  btn.disabled = false; btn.textContent = t('login_btn');
};

window.doLogout = async function() {
  await signOut(auth);
  toast(t('logout_success'),'info');
};

window.adminPillClick = function() {
  if (S.isAdmin) doLogout();
  else openLoginModal();
};

function updateUI() {
  document.getElementById('week-pill').textContent = S.currentWeekKey;
  const dot = document.getElementById('adot');
  const lbl = document.getElementById('apill-lbl');
  if (S.isAdmin) { dot.className='admin-dot'; lbl.textContent=t('admin_logout'); }
  else { dot.className='admin-dot off'; lbl.textContent=t('admin_login_lock'); }
  applyTranslations();
  renderNav();
  rerender();
}

function renderNav() {
  const failCount = getFailIds(S.currentWeekKey).length;
  const nav = document.getElementById('nav-bar');
  nav.innerHTML = `
    <button class="nav-btn ${activeTab==='summary'?'active':''}" onclick="showTab('summary')">
      <span>📊</span><span class="tab-txt">${t('tab_summary')}</span>
    </button>
    <button class="nav-btn ${activeTab==='history'?'active':''}" onclick="showTab('history')">
      <span>📜</span><span class="tab-txt">${t('tab_history')}</span>
    </button>
    <button class="nav-btn ${activeTab==='alwaysfail'?'active':''}" onclick="showTab('alwaysfail')">
      <span>🚨</span><span class="tab-txt">${t('tab_alwaysfail')}</span>
    </button>
    ${S.isAdmin ? `
    <button class="nav-btn ${activeTab==='fail'?'active':''}" onclick="showTab('fail')">
      <span>❌</span><span class="tab-txt">${t('tab_inputfail')}</span>
      <span class="nbadge">${failCount}</span>
    </button>
    <button class="nav-btn ${activeTab==='master'?'active':''}" onclick="showTab('master')">
      <span>👥</span><span class="tab-txt">${t('tab_master')}</span>
      <span class="nbadge">${S.members.length}</span>
    </button>` : ''}
  `;
  if (!S.isAdmin && (activeTab === 'master' || activeTab === 'fail')) {
    activeTab = 'summary';
  }
}

let activeTab = 'summary';
window.showTab = function(tab) {
  if (!S.isAdmin && (tab==='master'||tab==='fail')) {
    toast(t('admin_only'),'error'); return;
  }
  activeTab = tab;
  ['master','fail','summary','history','alwaysfail'].forEach(t => {
    document.getElementById('page-'+t).style.display = 'none';
  });
  document.getElementById('page-'+tab).style.display = 'block';
  renderNav();
  rerender();
};

function rerender() {
  if (activeTab==='master')     renderMaster();
  if (activeTab==='fail')       renderFail();
  if (activeTab==='summary')    renderSummary();
  if (activeTab==='history')    renderHistory();
  if (activeTab==='alwaysfail') renderAlwaysFail();
}

  const m = S.members.find(m=>m.id===id);
  if (!m) return;
  m.status = (m.status||'join')==='join' ? 'out' : 'join';
  if (!m.statusHistory) m.statusHistory=[];
  m.statusHistory.push({s:m.status, d:getToday()});
  await saveMembers();
  toast(m.status==='join'?t('status_toast_join'):t('status_toast_out'),'success');
};
window.togStatusHist = function(id) {
  const el=document.getElementById('sh-'+id);
  if(el) el.classList.toggle('open');
};
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getPrevWeek(refKey) {
  const ref = refKey || S.currentWeekKey;
  const keys = Object.keys(S.weeks).sort();
  const idx  = keys.indexOf(ref);
  return idx > 0 ? keys[idx-1] : null;
}
function computeSummary(refKey) {
  const wk    = refKey || S.currentWeekKey;
  const cur   = getFailIds(wk);
  const prevK = getPrevWeek(wk);
  const prev  = prevK ? getFailIds(prevK) : [];
  const demote=[], promote=[], stable=[], r2fail=[];
  for (const m of activeMembers()) {
    const inCur  = cur.includes(m.id);
    const inPrev = prev.includes(m.id);
    if (inCur) {
      demote.push(m);                          // gagal minggu ini → masuk demote
      if (m.rank === 'R2') r2fail.push(m);     // sudah R2, ranknya tidak berubah (info saja)
    }
    else if (inPrev) promote.push(m);          // gagal minggu lalu, tidak gagal minggu ini → promote
    else             stable.push(m);
  }
  return { demote, promote, stable, r2fail };
}
window.applyRanks = async function(refKey) {
  const {demote, promote} = computeSummary(refKey);
  let changed = 0;
  for (const m of demote) {
    const mb = S.members.find(x => x.id === m.id);
    if (mb && mb.rank !== 'R2') { mb.rank = 'R2'; changed++; }
  }
  for (const m of promote) {
    const mb = S.members.find(x => x.id === m.id);
    if (mb && mb.rank !== 'R3') { mb.rank = 'R3'; changed++; }
  }
  if (changed) {
    await saveMembers();
    toast(`✅ ${changed} ${t('rank_applied')} (${demote.length} ${t('rank_demote_lbl')}, ${promote.length} ${t('rank_promote_lbl')}).`, 'success');
  } else {
    toast(t('rank_no_change'), 'info');
  }
};
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className='', 3000);
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('show');
}

  const ids=getFailIds(S.currentWeekKey);
  const hits=activeMembers().filter(m=>m.name.toLowerCase().includes(fsearch.toLowerCase())&&!ids.includes(m.id)).slice(0,8);
  if (!hits.length) { ac.classList.remove('open'); return; }

window.onFK = function(e) {
  const ac=document.getElementById('acl');
  const items=ac.querySelectorAll('.acitem');
  if (e.key==='ArrowDown'){acIdx=Math.min(acIdx+1,items.length-1);hlAc(items);e.preventDefault();}
  else if(e.key==='ArrowUp'){acIdx=Math.max(acIdx-1,-1);hlAc(items);e.preventDefault();}
  else if(e.key==='Enter'){
    if(acIdx>=0&&items[acIdx]) addFail(items[acIdx].dataset.id);
    else if(items.length===1) addFail(items[0].dataset.id);
  }
  else if(e.key==='Escape'){ac.classList.remove('open');acIdx=-1;}
};

      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${stable.length===0?`<span style="color:var(--muted);font-size:13px">—</span>`:
          stable.map(m=>`<span style="background:var(--golddim);border:1px solid rgba(240,167,50,.25);color:var(--gold);font-size:12px;padding:4px 12px;border-radius:20px">${esc(m.name)}</span>`).join('')}
      </div>
    </div>
  `;
}
window.changeSummaryWeek = function(v) {
  if (!v) return;
  S.summaryWeekKey = v;
  renderSummary();
};
window.exportSummary = function() {
  const selWeek = S.summaryWeekKey;
  const {demote,promote,stable,r2fail}=computeSummary(selWeek);
  const prevKey=getPrevWeek(selWeek);
  let txt=`${t('export_hdr')}\n`;
  txt+=`${t('export_week')} ${getWeekLabel(selWeek)}\n`;
  if(prevKey) txt+=`${t('export_vs')} ${getWeekLabel(prevKey)}\n`;
  txt+=`\n${'='.repeat(44)}\n`;
  txt+=`\n${t('export_demote')} (${demote.length}):\n`;
  demote.forEach((m,i)=>txt+=`  ${i+1}. ${m.name}\n`);
  txt+=`\n${t('export_promote')} (${promote.length}):\n`;
  promote.forEach((m,i)=>txt+=`  ${i+1}. ${m.name}\n`);
  txt+=`\n${t('export_stable')} (${stable.length}):\n`;
  stable.forEach((m,i)=>txt+=`  ${i+1}. ${m.name}\n`);
  if(r2fail.length){
    txt+=`\n${t('export_r2fail')} (${r2fail.length}):\n`;
    r2fail.forEach((m,i)=>txt+=`  ${i+1}. ${m.name}\n`);
  }
  txt+=`\n${'='.repeat(44)}\n${t('export_total')} ${S.members.length}\n`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
  a.download=`rekap_${S.summaryWeekKey}.txt`;a.click();
};

// ════════════════════════════════════════
//  PAGE: HISTORY (PUBLIC)
// ════════════════════════════════════════
function renderHistory() {
  const page=document.getElementById('page-history');
  const keys=Object.keys(S.weeks).sort().reverse();
  if (!keys.length) {
    page.innerHTML=`
      ${!S.isAdmin?`<div class="pub-banner">${t('pub_edit_only')} <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="openLoginModal()">${t('pub_login_btn')}</button></div>`:''}
      <div class="card"><div class="empty"><div class="empty-ico">📜</div><div class="empty-txt">${t('history_empty')}</div></div></div>`;
    return;
  }
  page.innerHTML=`
    ${!S.isAdmin?`<div class="pub-banner">${t('pub_edit_only')} <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="openLoginModal()">${t('pub_login_btn')}</button></div>`:''}
    <div class="card">
      <div class="card-hd"><div class="card-title">${t('history_title')}</div></div>
      ${keys.map((wk,i)=>{
        const ids=getFailIds(wk);
        const ms=ids.map(id=>memberById(id)).filter(Boolean);
        const isCur=wk===S.currentWeekKey;
        return `
          <div class="hwrap">
            <div class="hhd" onclick="togH('hb-${i}','hc-${i}')">
              <div class="htitle-w">
                ${isCur?'🔴 ':''}${getWeekLabel(wk)}
                <span class="nbadge">${ids.length} ${t('history_fail_badge')}</span>
              </div>
              <span class="chev" id="hc-${i}">▼</span>
            </div>
            <div class="hbody" id="hb-${i}">
              ${ms.length===0?`<span style="color:var(--muted);font-size:13px">${t('history_no_fail')}</span>`:
                ms.map(m=>`<span class="fpill">${esc(m.name)}</span>`).join('')}
              ${S.isAdmin?`<div style="margin-top:12px"><button class="btn btn-red btn-sm" onclick="delWeek('${wk}');event.stopPropagation()">${t('history_del_btn')}</button></div>`:''}
            </div>
          </div>`;
      }).join('')}
    </div>
  `;
}
window.togH = function(bid,cid) {
  document.getElementById(bid).classList.toggle('open');
  document.getElementById(cid).classList.toggle('open');
};
window.delWeek = async function(wk) {
  if (!confirm(`${t('history_del_confirm')} ${getWeekLabel(wk)}?`)) return;
  delete S.weeks[wk];
  await saveWeeks(); toast(t('history_deleted'),'info');
};

// ════════════════════════════════════════
//  PAGE: SERING GAGAL (PUBLIC)
// ════════════════════════════════════════
let minFailFilter = 2;

function computeFailStats() {
  const weekKeys = Object.keys(S.weeks).sort();
  const totalWeeks = weekKeys.length;
  const stats = [];
  for (const m of activeMembers()) {
    const failWeeks = weekKeys.filter(wk => S.weeks[wk].includes(m.id));
    const failCount = failWeeks.length;
    if (failCount === 0) continue;
    let streak = 0;
    for (let i = weekKeys.length - 1; i >= 0; i--) {
      if (S.weeks[weekKeys[i]].includes(m.id)) streak++;
      else break;
    }
    stats.push({ member: m, failCount, streak, failWeeks, totalWeeks });
  }
  stats.sort((a, b) => b.failCount - a.failCount || b.streak - a.streak);
  return { stats, totalWeeks };
}

function renderAlwaysFail() {
  const page = document.getElementById('page-alwaysfail');
  if (!S.loaded || !S.members.length) {
    page.innerHTML = `<div class="card"><div class="loading-wrap"><div class="spinner"></div>${t('loading')}</div></div>`;
    return;
  }
  const { stats, totalWeeks } = computeFailStats();
  const filtered = stats.filter(s => s.failCount >= minFailFilter);
  const filterBtns = [1,2,3,4,5].map(n =>
    `<button class="btn ${minFailFilter===n?'btn-gold':'btn-ghost'} btn-sm" onclick="setMinFail(${n})">≥${n}x</button>`
  ).join('');

  page.innerHTML = `
    ${!S.isAdmin ? `<div class="pub-banner">${t('pub_edit_only')} <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="openLoginModal()">${t('pub_login_btn')}</button></div>` : ''}
    <div class="card">
      <div class="card-hd"><div class="card-title">${t('af_title')}</div></div>
      <div class="alert alert-warn">⚠ ${t('af_desc_pre')} <strong>${totalWeeks} ${t('af_desc_week')}</strong> ${t('af_desc_mid')} <strong>${minFailFilter}x</strong>.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center">
        <span style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px">${t('af_filter_lbl')}</span>
        ${filterBtns}
      </div>
      <div class="stats">
        <div class="sbox"><div class="snum c-gold">${totalWeeks}</div><div class="slbl">${t('af_stat_weeks')}</div></div>
        <div class="sbox"><div class="snum c-red">${filtered.length}</div><div class="slbl">${t('af_stat_players')}</div></div>
        <div class="sbox"><div class="snum c-red">${stats.filter(s=>s.streak>=2).length}</div><div class="slbl">${t('af_stat_streak')}</div></div>
      </div>
    </div>
    ${filtered.length === 0 ? `
      <div class="card"><div class="empty"><div class="empty-ico">🎉</div>
        <div class="empty-txt">${t('af_empty_pre')}${minFailFilter}x.</div>
      </div></div>` : `
    <div class="card">
      <div class="card-hd"><div class="card-title">${t('af_list_title')} (${filtered.length})</div></div>
      <div class="mlist">
        ${filtered.map((s, i) => {
          const pct = totalWeeks > 0 ? Math.round(s.failCount / totalWeeks * 100) : 0;
          const streakBadge = s.streak >= 2
            ? `<span style="background:rgba(231,76,60,.18);color:var(--red2);font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap">🔥 ${s.streak}${t('af_streak')}</span>`
            : '';
          return `
            <div class="mrow" style="flex-direction:column;align-items:flex-start;gap:6px;padding:12px">
              <div style="display:flex;width:100%;align-items:center;gap:8px;flex-wrap:wrap">
                <span class="mnum">${i+1}</span>
                <span class="mname" style="flex:1">${esc(s.member.name)}</span>
                <span style="background:rgba(231,76,60,.18);color:var(--red2);font-weight:700;font-size:14px;padding:3px 10px;border-radius:10px;min-width:44px;text-align:center">${s.failCount}x</span>
                ${streakBadge}
              </div>
              <div style="padding-left:32px;width:100%">
                <div style="background:var(--bg2);border-radius:4px;height:5px;overflow:hidden;margin-bottom:6px">
                  <div style="height:100%;width:${pct}%;background:var(--red2);border-radius:4px"></div>
                </div>
                <div style="font-size:11px;color:var(--muted)">
                  ${t('af_fail_at')} ${s.failWeeks.map(wk => `<span style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:1px 7px;font-size:10px;margin:1px 2px;display:inline-block">${wk}</span>`).join('')}
                </div>
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`}
  `;
}
window.setMinFail = function(n) { minFailFilter = n; renderAlwaysFail(); };

</script>
